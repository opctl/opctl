description: checks if CHANGELOG.md is included in the diff between this branch and main
name: check-for-changelog
run:
  container:
    image:
      ref: bitnami/git:latest
    cmd:
      - /bin/sh
      - -c
      - ./.opspec/changelog/find-in-diff/check.sh
    workDir: /src
    dirs:
      /src: $(../../..)
    files:
      /root/.gitconfig: |
        [safe]
          directory = /src
